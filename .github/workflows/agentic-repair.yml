name: CI/CD Pipeline with Agentic Repair

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      id: install
      run: |
        {
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest 
        } 2>&1 | tee -a pipeline_output.log
      continue-on-error: true
        
    - name: Run PyTest test cases
      id: tests
      if: steps.install.outcome == 'success'
      run: |
        echo "Running automated test suites..."
        pytest tests/ 2>&1 | tee -a pipeline_output.log
      continue-on-error: true

    - name: Agentic Repair Hook
      if: failure()
      run: pip install agentic-repair-cli && agentic-repair push --endpoint="${{ secrets.AGENTIC_WEBHOOK_URL }}/webhook/ci_failure"
