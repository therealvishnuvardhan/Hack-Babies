name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests (Simulate failure or run actual tests)
      id: run_tests
      run: |
        echo "Traceback: ZeroDivisionError" > test_output.log
        exit 1
        
      continue-on-error: true

    - name: Agentic CI/CD Webhook Trigger
      if: steps.run_tests.outcome == 'failure'
      run: |
        echo "Tests failed. Extracting logs and diff for Agentic Repair..."
        
        GIT_DIFF=$(git diff HEAD~1 HEAD)
        
        ERROR_LOGS=$(head -n 50 test_output.log || echo "No logs found")
        
        PAYLOAD=$(jq -n \
                  --arg repo "${{ github.repository }}" \
                  --arg commit "${{ github.sha }}" \
                  --arg diff "$GIT_DIFF" \
                  --arg logs "$ERROR_LOGS" \
                  --arg status "failed" \
                  '{repo_name: $repo, commit_hash: $commit, error_logs: $logs, git_diff: $diff, status: $status}')
                  
        curl -X POST "${{ secrets.AGENTIC_WEBHOOK_URL }}/webhook/ci_failure" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD"
             
        echo "Webhook sent! Pipeline halted, awaiting Agentic Fix Approval."
        exit 
