name: CI/CD Pipeline with Agentic Repair

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f myproject/requirements.txt ]; then pip install -r myproject/requirements.txt; fi
        python -c "import nltk; nltk.download('stopwords'); nltk.download('words')"
        pip install pytest pytest-django
        
    - name: Run automated tests for all files
      id: tests
      run: |
        echo "Running automated test suites for all files in the system..."
        export PYTHONPATH=$PYTHONPATH:$(pwd)/myproject
        export DJANGO_SETTINGS_MODULE=myproject.settings
        pytest . 2>&1 | tee test_output.log
      continue-on-error: true

    - name: Trigger Agentic AI Repair (On Failure)
      if: steps.tests.outcome == 'failure'
      run: |
        echo "Pipeline Failed! Packaging error context for Agentic AI..."
        
        GIT_DIFF=$(git diff HEAD~1 HEAD)
        ERROR_LOGS=$(tail -n 100 test_output.log || echo "Test logs missing")
        
        PAYLOAD=$(jq -n \
                  --arg repo "${{ github.repository }}" \
                  --arg commit "${{ github.sha }}" \
                  --arg diff "$GIT_DIFF" \
                  --arg logs "$ERROR_LOGS" \
                  --arg status "failed" \
                  '{repo_name: $repo, commit_hash: $commit, error_logs: $logs, git_diff: $diff, status: $status}')
                  
        curl -X POST "${{ secrets.AGENTIC_WEBHOOK_URL }}/webhook/ci_failure" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD"
             
        echo "Agentic AI pipeline triggered."
        exit 1
